name: Deploy Next.js to Staging Server

on:
  push:
    branches:
      - develop # branch de staging

jobs:
  deploy-staging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Install SSH and rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass openssh-client rsync netcat-openbsd dnsutils iputils-ping

      - name: Create rsync exclude file
        run: |
          echo "node_modules/" >> .rsync-exclude.txt
          echo ".next/" >> .rsync-exclude.txt
          echo ".git/" >> .rsync-exclude.txt
          echo ".turbo/" >> .rsync-exclude.txt
          echo ".env" >> .rsync-exclude.txt
          echo "*.log" >> .rsync-exclude.txt

      - name: Verify secrets configuration
        continue-on-error: true
        run: |
          echo "=== Verifying Secrets Configuration ==="
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "❌ SSH_HOST secret is not set"
          else
            echo "✅ SSH_HOST is configured (value hidden)"
          fi
          
          if [ -z "${{ secrets.SSH_USER }}" ]; then
            echo "❌ SSH_USER secret is not set"
          else
            echo "✅ SSH_USER is configured (value hidden)"
          fi
          
          if [ -z "${{ secrets.SSH_PASSWORD }}" ]; then
            echo "❌ SSH_PASSWORD secret is not set"
          else
            echo "✅ SSH_PASSWORD is configured (value hidden)"
          fi
          
          if [ -z "${{ secrets.SSH_APP_PATH_STAGING }}" ]; then
            echo "❌ SSH_APP_PATH_STAGING secret is not set"
          else
            echo "✅ SSH_APP_PATH_STAGING is configured (value hidden)"
          fi
          echo "=== End Secrets Verification ==="

      - name: Network diagnostics
        continue-on-error: true
        run: |
          echo "=== Network Diagnostics ==="
          echo "Target: ${{ secrets.SSH_HOST }}:22100"
          echo ""
          
          echo "1. Testing DNS resolution..."
          if command -v nslookup &> /dev/null; then
            if nslookup ${{ secrets.SSH_HOST }} 2>&1; then
              echo "✅ DNS resolution successful"
            else
              echo "❌ DNS lookup failed - hostname may be incorrect"
            fi
          else
            echo "⚠️  nslookup not available"
          fi
          echo ""
          
          echo "2. Testing basic connectivity (ping)..."
          if command -v ping &> /dev/null; then
            if ping -c 3 -W 2 ${{ secrets.SSH_HOST }} 2>&1; then
              echo "✅ Ping successful - server is reachable"
            else
              echo "❌ Ping failed - 100% packet loss"
              echo "   This indicates the server may be down or unreachable"
            fi
          else
            echo "⚠️  ping not available"
          fi
          echo ""
          
          echo "3. Testing port 22100 connectivity..."
          if command -v nc &> /dev/null; then
            if timeout 5 nc -zv -w 2 ${{ secrets.SSH_HOST }} 22100 2>&1; then
              echo "✅ Port 22100 is open and accessible"
            else
              echo "❌ Port 22100 connection test failed"
              echo "   Possible causes:"
              echo "   - Port is blocked by firewall"
              echo "   - SSH service is not running on port 22100"
              echo "   - Server firewall is blocking the connection"
            fi
          else
            echo "⚠️  netcat not available, skipping port test"
          fi
          echo ""
          echo "=== End Diagnostics ==="

      - name: Test SSH connection
        continue-on-error: true
        run: |
          echo "=== Testing SSH Connection ==="
          echo "Host: ${{ secrets.SSH_HOST }}"
          echo "Port: 22100"
          echo "User: ${{ secrets.SSH_USER }}"
          
          SSH_CONNECTED=false
          for i in {1..3}; do
            echo ""
            echo "Attempt $i of 3..."
            echo "Command: ssh -o ConnectTimeout=15 -o ServerAliveInterval=5 -o ServerAliveCountMax=2 -p 22100 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
            
            if sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              -o ServerAliveInterval=5 \
              -o ServerAliveCountMax=2 \
              -o BatchMode=yes \
              -o LogLevel=ERROR \
              -p 22100 \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "echo 'SSH connection successful'"; then
              echo "✅ SSH connection test passed"
              SSH_CONNECTED=true
              break
            else
              EXIT_CODE=$?
              echo "❌ SSH connection test failed (exit code: $EXIT_CODE), attempt $i"
              if [ $i -lt 3 ]; then
                echo "Waiting 3 seconds before retry..."
                sleep 3
              fi
            fi
          done
          
          if [ "$SSH_CONNECTED" = "false" ]; then
            echo ""
            echo "⚠️  WARNING: SSH connection test failed after 3 attempts"
            echo ""
            echo "🔍 TROUBLESHOOTING GUIDE:"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "1. Verify server is running and accessible:"
            echo "   ping ${{ secrets.SSH_HOST }}"
            echo ""
            echo "2. Test SSH connection from your local machine:"
            echo "   ssh -p 22100 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
            echo ""
            echo "3. Check if SSH service is running on port 22100:"
            echo "   sudo systemctl status ssh"
            echo "   sudo ss -tlnp | grep 22100"
            echo ""
            echo "4. Verify SSH configuration on server (/etc/ssh/sshd_config):"
            echo "   Port 22100"
            echo "   Then restart: sudo systemctl restart ssh"
            echo ""
            echo "5. Check firewall rules (ufw/iptables/firewalld):"
            echo "   sudo ufw status"
            echo "   sudo ufw allow 22100/tcp"
            echo ""
            echo "6. If using cloud provider (AWS/GCP/Azure), check:"
            echo "   - Security groups allow inbound on port 22100"
            echo "   - Network ACLs allow the connection"
            echo "   - Server is in a public subnet (if needed)"
            echo ""
            echo "7. Verify GitHub Actions IP ranges are allowed:"
            echo "   https://api.github.com/meta (for GitHub-hosted runners)"
            echo ""
            echo "8. Double-check secrets in GitHub repository settings:"
            echo "   - SSH_HOST (should be IP or hostname)"
            echo "   - SSH_USER (SSH username)"
            echo "   - SSH_PASSWORD (SSH password)"
            echo "   - SSH_APP_PATH_STAGING (deployment path)"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "The deployment will continue, but will likely fail during rsync or build steps."
            echo "Please fix the connectivity issues before proceeding."
          fi
          echo "=== End SSH Test ==="

      - name: Sync project to remote server via rsync (excluding heavy files)
        timeout-minutes: 10
        run: |
          echo "Starting rsync sync..."
          MAX_RETRIES=3
          RETRY_DELAY=10
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Rsync attempt $i of $MAX_RETRIES..."
            
            if sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avz --delete \
              --exclude-from=.rsync-exclude.txt \
              --timeout=300 \
              -e "ssh -o StrictHostKeyChecking=no \
                  -o ConnectTimeout=30 \
                  -o ServerAliveInterval=10 \
                  -o ServerAliveCountMax=3 \
                  -o TCPKeepAlive=yes \
                  -p 22100" \
              ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_APP_PATH_STAGING }}/; then
              echo "Rsync completed successfully"
              exit 0
            else
              EXIT_CODE=$?
              echo "Rsync failed with exit code $EXIT_CODE, attempt $i of $MAX_RETRIES"
              
              if [ $i -lt $MAX_RETRIES ]; then
                echo "Waiting $RETRY_DELAY seconds before retry..."
                sleep $RETRY_DELAY
                RETRY_DELAY=$((RETRY_DELAY * 2))  # Exponential backoff
              else
                echo ""
                echo "❌ Rsync failed after $MAX_RETRIES attempts"
                echo ""
                echo "🔍 This failure is likely due to SSH connectivity issues."
                echo "Please review the troubleshooting guide from the SSH connection test step above."
                echo ""
                exit $EXIT_CODE
              fi
            fi
          done

      - name: Build and run Docker Compose on remote server
        timeout-minutes: 15
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            -o TCPKeepAlive=yes \
            -p 22100 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e

            cd ${{ secrets.SSH_APP_PATH_STAGING }}

            echo "Removendo build antigo para evitar cache"
            rm -rf .next

            echo "Gerando novo .env com secrets de staging"
            echo "NEXT_PUBLIC_API_URL=${{ secrets.STAGING_NEXT_PUBLIC_API_URL }}" > .env
            echo "NEXT_API_KEY_MASTER=${{ secrets.NEXT_API_KEY_MASTER }}" >> .env

              echo "Executando docker compose build com build-args (staging)"
            docker compose -f docker-compose-staging.yml build --build-arg NEXT_PUBLIC_API_URL=${{ secrets.STAGING_NEXT_PUBLIC_API_URL }}

            echo "Executando docker compose up -d (staging)"
            docker compose -f docker-compose-staging.yml up -d
          EOF

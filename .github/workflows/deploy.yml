name: Deploy Painel Robo

on:
  push:
    branches:
      - main

concurrency:
  group: painel-robo-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
      ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
      TASK_FAMILY: ${{ secrets.TASK_FAMILY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push image
        run: |
          IMAGE_URI=${ECR_REGISTRY}/${ECR_REPOSITORY}:${GITHUB_SHA}
          IMAGE_LATEST=${ECR_REGISTRY}/${ECR_REPOSITORY}:latest

          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_JURI_API_URL=${{ secrets.PUBLIC_JURI_API_URL }} \
            -t $IMAGE_URI \
            -t $IMAGE_LATEST \
            .

          docker push --all-tags ${ECR_REGISTRY}/${ECR_REPOSITORY}

          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Render Task Definition
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          TASK_FAMILY: ${{ env.TASK_FAMILY }}
          IMAGE_URI: ${{ env.IMAGE_URI }}
          EXECUTION_ROLE_ARN: ${{ secrets.EXECUTION_ROLE_ARN }}
          SECRET_ARN_PREFIX: ${{ secrets.SECRET_ARN_PREFIX }}
          LOG_GROUP: ${{ secrets.LOG_GROUP }}
        run: node ./scripts/render-task-definition.mjs task-def-rendered.json

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: task-def-rendered.json
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

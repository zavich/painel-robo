version: "3"

services:
  nextjs-app-staging:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: ${STAGING_NEXT_PUBLIC_API_URL}
    container_name: prosolutti-robo-staging
    env_file:
      - .env
    command: npm run start
    restart: always
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"
      # - "traefik.http.routers.analises-staging.rule=Host(`staging.analisesprosolutti.com`)"
      - "traefik.http.routers.analises-staging.rule=Host(`teste.analisesprosolutti.com`)"
      - "traefik.http.routers.analises-staging.entrypoints=websecure"
      - "traefik.http.routers.analises-staging.tls.certresolver=mytlschallenge"
      - "traefik.http.services.analises-staging.loadbalancer.server.port=8181"
    expose:
      - "8181"

networks:
  traefik-net:
    external: true
